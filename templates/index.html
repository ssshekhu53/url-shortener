<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Home | URL Shortener</title>

    <meta name="author" content="Shashank Shekhar" />
    <meta name="author" content="https://www.stackshekhu.cf/" />
    <meta name="description" content="A simple and free url shortener based on flask." />
    <meta name="theme-color" content="#4270C8"/>

    <!-- Open Graph -->
    <meta property="og:title" content="URL Shortener" />
    <meta property="og:url" content="https://py-shortener.herokuapp.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="A simple and free url shortener based on flask." />
    <meta property="og:image" content="https://py-shortener.herokuapp.com/static/img/logo.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="URL Shortener" />
    <meta name="twitter:description" content="A simple and free url shortener based on flask." />
    <meta name="twitter:url" content="https://py-shortener.herokuapp.com/" />
    <meta name="twitter:image" content="https://py-shortener.herokuapp.com/static/img/logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="img/png" href="/static/img/logo.png">

    <!-- Bootstrap 4 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">

    <!-- Font CDN -->
    <link href='https://use.fontawesome.com/releases/v5.7.2/css/all.css'>

    <!-- Custom CSS -->
    <link href="/static/css/style.css" rel="stylesheet" type="text/css">
    <style>
        input[name="short-url"]
        {
            border: none;
            background: none;
        }
    </style>
</head>
<body>

<!-- Main Content -->
<form id="short-form">
    <div class="container d-flex justify-content-center align-items-center h-100vh">
        <div class="d-flex flex-column justify-content-between">
            <div class="card mt-3 p-5">
                <div class="logo mb-3"><img src="/static/img/logo.png"></div>
                <div>
                    <p class="mb-1">Short Links</p>
                    <h4 class="mb-5 text-white">Big Results!</h4>
                </div>
            </div>
            <div class="card two bg-white px-5 py-4 mb-3">
                <div class="form-group"><input type="text" class="form-control" name="urlField" id="urlField"><label class="form-control-placeholder" for="urlField">Paste URL</label></div>
                <button class="btn btn-primary btn-block btn-lg mt-1 mb-2"><span>Make TinyURL!<i class="fas fa-long-arrow-alt-right ml-2"></i></span></button>
                <div class="alert alert-primary" style="display: none;"><input type="text" name="short-url" class="w-100" readonly /></div>
                <button type="button" class="btn" id="copy-btn" style="display: none;"><i class="far fa-copy"></i>Copy</button>
            </div>
        </div>
    </div>
</form>
<!-- Main Content -->

<div class="footer">
    <div class="fw-bolder">Made with <span class="text-danger" style="font-size: 25px;">&hearts;</span> by <a href="https://www.stackshekhu.cf/" target="_blank">SoloSheku</a></div>
</div>

<!-- Bootstrap 4 JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>
<!-- jQuery CDN -->
<script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js'></script>
<!-- jQuery Validate -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.2/jquery.validate.min.js" integrity="sha512-UdIMMlVx0HEynClOIFSyOrPggomfhBKJE28LKl8yR3ghkgugPnG6iLfRfHwushZl1MOPSY6TsuBDGPK2X4zYKg==" crossorigin="anonymous"></script>

<!-- Custom JS -->
<script src="/static/js/script.js"></script>
</body>
</html>
